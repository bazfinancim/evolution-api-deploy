services:
  - type: web
    name: evolution-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /
    envVars:
      - key: AUTHENTICATION_API_KEY
        value: baz2026secret
      - key: SERVER_PORT
        value: "8080"
      - key: DATABASE_ENABLED
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
